<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Full diagnosis history with filtering tools." />
  <title>Digital Ophthalmology Assistant | History</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="assets/icons.js"></script>
  <script defer src="app.js"></script>
</head>
<body data-page="history">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html"><span class="icon" data-icon="eye"></span>Digital Ophthalmology Assistant</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">Menu</button>
      <nav id="site-nav" class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="diagnose.html">Diagnosis</a>
        <a href="diseases.html">Disease Library</a>
        <a href="education.html">Education</a>
        <a href="safety.html">Safety</a>
        <a href="about.html">About</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme"><span class="icon theme-icon" data-icon="sun"></span></button>
    </div>
  </header>

  <main id="main-content" class="section">
    <div class="container">
      <div class="section-head reveal reveal-up">
        <h1><span class="icon" data-icon="history"></span>Full Analysis History</h1>
        <p>Filter stored local runs by predicted class for audit and teaching review.</p>
      </div>
      <div class="card reveal reveal-up">
        <div class="history-filters">
          <label for="history-filter">Filter by class:</label>
          <select id="history-filter">
            <option value="all">All</option>
            <option value="Normal">Normal</option>
            <option value="Conjunctivitis">Conjunctivitis</option>
            <option value="Pterygium">Pterygium</option>
            <option value="Keratitis">Keratitis</option>
          </select>
          <button id="clear-all-history" class="btn btn-ghost" type="button">Clear All</button>
        </div>
        <div id="history-full" class="history-grid"></div>
      </div>
    </div>
  </main>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top"><span class="icon" data-icon="chevron"></span></button>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <footer class="footer"><div class="container"><p>Educational platform interface only. Not a substitute for licensed medical diagnosis.</p></div></footer>
</body>
</html>
